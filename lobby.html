<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Drafter (v9.0 Optimized)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b0d;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .hero-img-container {
            aspect-ratio: 12 / 16;
            background-color: #1a1d24;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            backface-visibility: hidden;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .group:hover .hero-img {
            transform: scale(1.05);
        }

        @keyframes text-shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .text-shimmer {
            background: linear-gradient(90deg, #fff, #4ade80, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-shimmer 3s linear infinite;
        }

        .team-card {
            background: rgba(21, 23, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slot-box {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
        }

        .strategy-option {
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            width: 100%;
        }

        .strategy-option.active {
            border-color: rgba(255, 255, 255, 0.2) !important;
            background: rgba(255, 255, 255, 0.05);
        }

        .hero-banned-fx {
            filter: grayscale(100%) brightness(0.4);
            opacity: 0.5;
        }

        .hero-picked-fx {
            filter: brightness(0.3);
            opacity: 0.4;
        }

        .ban-quota-slot {
            width: 44px;
            height: 56px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
        }

        @keyframes hero-appear {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-hero {
            opacity: 0;
            animation: hero-appear 0.4s forwards;
        }

        .timer-circle {
            transition: stroke-dashoffset 0.1s linear;
        }

        .scrollbar-custom::-webkit-scrollbar {
            width: 10px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            border: 2px solid #1a1d24;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-red {

            0%,
            100% {
                border-color: rgba(220, 38, 38, 0.5);
            }

            50% {
                border-color: rgba(220, 38, 38, 1);
            }
        }

        .pending-ban-glow {
            animation: pulse-red 1.5s infinite;
            border-width: 2px !important;
        }

        @keyframes pulse-active-slot {

            0%,
            100% {
                box-shadow: 0 0 0px rgba(245, 158, 11, 0);
            }

            50% {
                box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            }
        }

        .active-picker-slot {
            z-index: 50;
            transform: scale(1.15);
            border: 2px solid #f59e0b !important;
            background: rgba(245, 158, 11, 0.1) !important;
            animation: pulse-active-slot 2s infinite;
        }

        /* --- EMOJI CHAT SYSTEM --- */
        @keyframes emoji-float {
            0% {
                transform: translate(0, 0) scale(0.5) rotate(0deg);
                opacity: 0;
            }

            10% {
                transform: translate(var(--x-offset), -30px) scale(1.3) rotate(var(--rotate));
                opacity: 1;
            }

            100% {
                transform: translate(var(--x-spread), -150px) scale(1) rotate(calc(var(--rotate) * 2));
                opacity: 0;
            }
        }

        .floating-emoji {
            position: absolute;
            pointer-events: none;
            z-index: 2000;
            animation: emoji-float 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .emoji-picker {
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            transform: translateY(10px) scale(0.9);
            opacity: 0;
            pointer-events: none;
            filter: blur(10px);
        }

        .emoji-picker.active {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
            filter: blur(0);
        }

        .emoji-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .emoji-btn:hover {
            transform: scale(1.3) rotate(5deg);
        }

        .emoji-btn:active {
            transform: scale(0.9);
        }

        .role-tag {
            font-size: 8px;
            padding: 1px 3px;
            border-radius: 3px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-tag.active {
            background: #4ade80;
            color: #000;
        }

        .role-tag.inactive {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const manualConfig = {
            apiKey: "AIzaSyBOv8Tf0Z-XnSp3DUHstPo7FZyb1SPuAgA",
            authDomain: "project-578-032.firebaseapp.com",
            projectId: "project-578-032",
            storageBucket: "project-578-032.firebasestorage.app",
            messagingSenderId: "599943765176",
            appId: "1:599943765176:web:321689096ad8c008fe284d"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : manualConfig;
        const appId = "dota-drafter-pro-v9"; // v9: slim data format, local-first setup

        const app = initializeApp(firebaseConfig);

        const provider = new GoogleAuthProvider();

        const ANIM_DELAY = 5500;

        let localUser = { name: '', uid: '', photo: '', team: 'unassigned' };
        // v9 slim data: pool/picksRadiant/picksDire = [heroId,...], bans = [{i:heroId, t:team},...]
        // timerStart replaces timerEnd; excludedHeroIds/customHeroPositions removed from DB
        let roomData = {
            id: '', stage: 'entry', players: {}, hostUid: '',
            nValues: [5, 5, 5, 5, 5], pool: [], bans: {}, picksRadiant: {}, picksDire: {}, draftSequence: [],
            bansRadiant: 2, bansDire: 2, strategyIdx: 0, timerStart: 0, isExtraTime: false, votes: {},
            currentTurnTeam: 'Radiant', teamSizeRadiant: 5, teamSizeDire: 5,
            pendingHeroId: null, pickDuration: 20, infinitePickTime: false,
            banDuration: 20, infiniteBanTime: false, randomPickIds: {},
            excludedIds: [17, 42, 60], vipIds: [], setupPositions: {}
        };

        // --- AUDIO SYSTEM ---
        const SoundManager = {
            sfx: {},
            music: null,
            initialized: false,
            isMuted: false,
            isMusicMuted: false,
            init() {
                if (this.initialized) return;
                const assets = [
                    'another_hero_picked', 'button_click', 'count_pick_10', 'count_pick_5', 'draft_finished_1', 'draft_finished_2',
                    'hero_banned', 'heroes_list_drafted', 'hero_picked', 'hero_select_track', 'team_complete',
                    'time_extra', 'turn_ban', 'turn_choose_hero', 'welcome'
                ];
                assets.forEach(name => {
                    const audio = new Audio(`Assets/Sfx/${name}.mpeg`);
                    audio.load(); // Preheat
                    this.sfx[name] = audio;
                });
                this.music = this.sfx['hero_select_track'];
                if (this.music) {
                    this.music.loop = true;
                    this.music.volume = 0.5;
                }
                this.initialized = true;
            },
            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.isMuted) {
                    this.stopMusic();
                    Object.values(this.sfx).forEach(s => {
                        s.pause();
                        s.currentTime = 0;
                    });
                } else {
                    if (roomData.stage === 'banning' || roomData.stage === 'picking') {
                        this.startMusic();
                    }
                }
                renderHeader();
            },
            unlocked: false,
            // Call this on a user gesture to unlock all sounds
            unlock() {
                if (this.unlocked) return;
                this.init();
                this.unlocked = true;
                console.log("Unlocking audio context...");
                // Play a single silent/brief sound to unlock the browser's audio policy
                const dummy = this.sfx['button_click'];
                if (dummy) {
                    dummy.play().catch(() => { });
                }
            },
            play(name) {
                if (this.isMuted) return;
                if (!this.initialized) this.init();
                const s = this.sfx[name];
                if (!s) return;
                console.log(`Playing SFX: ${name}`);
                s.currentTime = 0;
                s.play().catch(e => {
                    console.warn(`Audio ${name} blocked:`, e);
                    // Add listener to play on next click if blocked
                    const unlocker = () => {
                        console.log(`Retrying blocked audio: ${name}`);
                        if (!this.isMuted) s.play();
                        document.removeEventListener('mousedown', unlocker);
                    };
                    document.addEventListener('mousedown', unlocker);
                });
            },
            startMusic() {
                // Background music disabled per user request
            },
            stopMusic() {
                if (this.music) {
                    this.music.pause();
                    this.music.currentTime = 0;
                }
            }
        };

        window.SoundManager = SoundManager;

        let lastAudioState = {
            stage: '',
            turnTeam: '',
            pickerUid: '',
            extraTime: false,
            timerThreshold: 0,
            picksCount: 0,
            bansCount: 0
        };

        let lastReactionTimes = {}; // uid -> timestamp

        function checkReactionTriggers() {
            const data = roomData;
            if (!data.reactions) return;
            const now = Date.now();
            Object.entries(data.reactions).forEach(([uid, reaction]) => {
                const lastTime = lastReactionTimes[uid] || 0;
                // Only trigger if it's a new reaction AND it happened in the last 5 seconds (avoid replaying old ones on join/refresh)
                if (reaction.time > lastTime && (now - reaction.time) < 5000) {
                    spawnFloatingEmoji(reaction.emoji, reaction.user || 'Elite', reaction.photo || '');
                    lastReactionTimes[uid] = reaction.time;
                } else if (reaction.time > lastTime) {
                    // Update the timestamp even if we didn't spawn it, to mark it as 'seen'
                    lastReactionTimes[uid] = reaction.time;
                }
            });
        }

        function checkSoundTriggers() {
            const data = roomData;
            if (data.stage === 'entry') return;
            if (!SoundManager.initialized) SoundManager.init();

            const playersArr = Object.values(data.players || {});
            const myP = playersArr.find(p => p.uid === localUser.uid);
            const myTeam = myP ? myP.team : 'unassigned';
            const turnP = getCurrentPickPlayer(data);

            // Counts-based sounds (check BEFORE turn/stage state updates)
            const picksCount = Object.keys(data.picksRadiant || {}).length + Object.keys(data.picksDire || {}).length;
            const bansCount = Object.keys(data.bans || {}).length;

            if (bansCount > lastAudioState.bansCount) {
                SoundManager.play('hero_banned');
            }
            if (picksCount > lastAudioState.picksCount) {
                // Play another_hero_picked if it wasn't a manual local pick that already played hero_picked
                if (!_lastPickWasManual) {
                    SoundManager.play('another_hero_picked');
                }
                _lastPickWasManual = false; // Reset
            }
            lastAudioState.picksCount = picksCount;
            lastAudioState.bansCount = bansCount;

            // 1. Stage transitions
            if (data.stage !== lastAudioState.stage) {
                console.log(`Stage transition: ${lastAudioState.stage} -> ${data.stage}`);
                if (data.stage === 'lobby') SoundManager.play('welcome');
                if (data.stage === 'formation') SoundManager.play('heroes_list_drafted');
                if (data.stage === 'result') {
                    SoundManager.stopMusic();
                    SoundManager.play('team_complete');
                    const finishSfx = Math.random() < 0.5 ? 'draft_finished_1' : 'draft_finished_2';
                    setTimeout(() => SoundManager.play(finishSfx), 800);
                }
                if (lastAudioState.stage && lastAudioState.stage !== 'lobby' && data.stage === 'lobby') {
                    SoundManager.stopMusic();
                }
                lastAudioState.stage = data.stage;
            }

            // 2. Turn changes
            if (data.stage === 'banning' || data.stage === 'picking') {
                if (data.currentTurnTeam !== lastAudioState.turnTeam) {
                    if (data.stage === 'banning' && data.currentTurnTeam === myTeam) {
                        SoundManager.play('turn_ban');
                    }
                    lastAudioState.turnTeam = data.currentTurnTeam;
                }

                const currentPickerUid = turnP?.uid || '';
                if (data.stage === 'picking' && currentPickerUid !== lastAudioState.pickerUid) {
                    if (currentPickerUid === localUser.uid) {
                        SoundManager.play('turn_choose_hero');
                    }
                    lastAudioState.pickerUid = currentPickerUid;
                }
            }

            // 3. Extra Time
            if (data.isExtraTime && !lastAudioState.extraTime) {
                if (data.currentTurnTeam === myTeam) {
                    SoundManager.play('time_extra');
                }
            }
            lastAudioState.extraTime = data.isExtraTime;
        }

        // Global listener to unlock audio context on first interaction
        window.addEventListener('mousedown', () => {
            SoundManager.unlock();
        }, { once: true });
        let isLocalMode = false;
        let poolAnimationPlayed = true;
        let botActionTimeout = null;
        let _lastPickWasManual = false;

        function getHeroPositions(heroId) { return roomData.setupPositions?.[heroId] || HEROES.find(h => h.id === heroId)?.positions || []; }
        function getStrategies(r, d) {
            const gen = (p) => {
                let s = [], ra = 0, da = 0, ct = 'Radiant';
                while (ra < r || da < d) {
                    let t = p[s.length % p.length];
                    let c = Math.min(t, (ct === 'Radiant' ? r - ra : d - da));
                    if (c > 0) { s.push({ team: ct, count: c }); if (ct === 'Radiant') ra += c; else da += c; }
                    ct = ct === 'Radiant' ? 'Dire' : 'Radiant';
                } return s;
            };
            return [{ name: "Professional", seq: gen([1, 2, 2, 2, 1]) }, { name: "Tournament (1-by-1)", seq: gen([1, 1]) }];

            const totalPicks = picksRadiantArr.length + picksDireArr.length;
            const totalExpected = (data.teamSizeRadiant || 0) + (data.teamSizeDire || 0);
            if (totalPicks >= totalExpected) return null;

            let acc = 0;
            for (let step of data.draftSequence) {
                acc += step.count;
                if (totalPicks < acc) {
                    const playersArr = Object.values(data.players || {});
                    const teamPlayers = playersArr.filter(p => p.team === step.team).sort((a, b) => a.slot - b.slot);

                    const pts = k.split('.'); let o = roomData;
                    for (let i = 0; i < pts.length - 1; i++) { if (!o[pts[i]]) o[pts[i]] = {}; o = o[pts[i]]; }

                            const counts = {}; teamVotes.forEach(id => counts[id] = (counts[id] || 0) + 1);

            if (isAdmin() && allInTeamVoted && (allVotedSame || roomData.infiniteBanTime) && !_finalizingTurn) { finalizeTurn(); return; }

            // Step 3: Admin detects when all players in team voted (but not same), triggers smooth acceleration
            if (isAdmin() && allInTeamVoted && !allVotedSame && !roomData.accelTimerStart && !_finalizingTurn) {
                updateRoom({ accelTimerStart: Date.now() }, true);
            }

            // Bug fix: Admin detects when all picks are done (e.g. a non-host made the last pick).
            if (isAdmin() && roomData.stage === 'picking' && !_finalizingTurn) {
                const totalPicks = Object.keys(roomData.picksRadiant || {}).length + Object.keys(roomData.picksDire || {}).length;
                const totalExpected = (roomData.teamSizeRadiant || 0) + (roomData.teamSizeDire || 0);
                if (totalExpected > 0 && totalPicks >= totalExpected) { finalizeTurn(); return; }
            }

            if ((roomData.infinitePickTime && roomData.stage === 'picking') || (roomData.infiniteBanTime && roomData.stage === 'banning')) {
                if (document.getElementById('turn-timer-text')) document.getElementById('turn-timer-text').innerText = "--";
                const progress = document.getElementById('timer-progress');
                if (progress) progress.style.strokeDashoffset = 0;
                return;
            }

            // Step 3: Smooth acceleration logic
            let rawLeft;
            if (roomData.accelTimerStart && roomData.stage === 'banning') {
                const timeAtNormalSpeed = Math.min(now, roomData.accelTimerStart) - roomData.timerStart;
                const timeAtFastSpeed = Math.max(0, now - roomData.accelTimerStart);
                rawLeft = Math.max(0, currentTurnMax - timeAtNormalSpeed - (timeAtFastSpeed * 4));
            } else {
                rawLeft = Math.max(0, currentTurnMax - elapsed);
            }

            const leftSec = Math.ceil(rawLeft / 1000);

            // Timer SFX thresholds
            if (leftSec === 10 && lastAudioState.timerThreshold !== 10) {
                SoundManager.play('count_pick_10');
                lastAudioState.timerThreshold = 10;
            } else if (leftSec === 5 && lastAudioState.timerThreshold !== 5) {
                SoundManager.play('count_pick_5');
                lastAudioState.timerThreshold = 5;
            } else if (leftSec > 10) {
                lastAudioState.timerThreshold = 0;
            }

            if (document.getElementById('turn-timer-text')) document.getElementById('turn-timer-text').innerText = leftSec;
            const progress = document.getElementById('timer-progress');
            if (progress) {
                const ratio = Math.min(1, rawLeft / currentTurnMax);
                progress.style.strokeDashoffset = 283 - (283 * ratio);
            }

            if (leftSec <= 0 && isAdmin() && !_finalizingTurn && !_actionLock) {
                if (roomData.isExtraTime) {
                    if (roomData.stage === 'picking') {
                        if (roomData.pendingHeroId) confirmPickAction(true); else randomPickAction(true);
                    } else finalizeTurn();
                } else {
                    if (roomData.stage === 'banning') finalizeTurn();
                    // Step 3: grant extra time with a timerStart reset for picking phase
                    else updateRoom({ timerStart: now, isExtraTime: true, accelTimerStart: 0 }, true);
                }
            }
        };

        const joinRoom = async (code) => {
            // Slim initD: no excludedHeroIds/customHeroPositions, timerStart instead of timerEnd
            const playersMap = {};
            playersMap[localUser.uid] = { ...localUser, team: 'unassigned', slot: -1 };
            const initD = {
                id: code, stage: 'lobby', players: playersMap, hostUid: localUser.uid,
                nValues: [5, 5, 5, 5, 5], pool: [], bans: {}, picksRadiant: {}, picksDire: {},
                teamSizeRadiant: 5, teamSizeDire: 5, draftSequence: [], bansRadiant: 2, bansDire: 2,
                strategyIdx: 0, timerStart: 0, isExtraTime: false, accelTimerStart: 0, votes: {}, currentTurnTeam: 'Radiant',
                pendingHeroId: null, pickDuration: 45, infinitePickTime: false,
                banDuration: 45, infiniteBanTime: false, randomPickIds: {},
                excludedIds: [17, 42, 60], setupPositions: {}
            };
            roomData.id = code; // Initialize early for transactions
            if (isLocalMode) { roomData = initD; render(); return; }
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            try {
                const snap = await getDoc(ref);
                if (!snap.exists()) {
                    await setDoc(ref, initD);
                    logEvent(analytics, 'lobby_joined', { room_id: code, is_host: true });
                } else {
                    await transactionalUpdateRoom((data) => {
                        return { [`players.${localUser.uid}`]: { ...localUser, team: 'unassigned', slot: -1 } };
                    });
                    logEvent(analytics, 'lobby_joined', { room_id: code, is_host: false });
                }

                onSnapshot(ref, d => {
                    if (!d.exists()) { roomData = { id: '', stage: 'entry' }; render(); }
                    else {
                        const data = d.data();
                        // 1. First, merge any existing server data with roomData to not lose keys
                        // 2. Then re-apply any pending local updates
                        for (let k in _pendingUpdate) {
                            if (k.includes('.')) {
                                const pts = k.split('.'); let o = data;
                                for (let i = 0; i < pts.length - 1; i++) {
                                    if (!o[pts[i]]) o[pts[i]] = {};
                                    o = o[pts[i]];
                                }
                                o[pts[pts.length - 1]] = _pendingUpdate[k];
                            } else if (k === 'players') {
                                // For full object replacement (like in shuffleAction)
                                data.players = { ...(data.players || {}), ..._pendingUpdate[k] };
                            } else {
                                data[k] = _pendingUpdate[k];
                            }
                        }
                        roomData = data;
                        checkSoundTriggers();
                        render();
                        checkReactionTriggers();
                    }

                });
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, u => {
            if (u && !isLocalMode && u.providerData.length > 0) {
                localUser = { uid: u.uid, name: u.displayName || "Elite", photo: u.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.uid}` };
                render();
            } else if (!isLocalMode && !localUser.uid) renderEntry(document.getElementById('main-content'));
        });
        setInterval(timerLogic, 100);
        window.onload = render;
    </script>
</body>
