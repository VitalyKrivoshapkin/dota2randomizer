        const CDN_BASE = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/";

        const showError = (msg) => {
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="p-8 text-center bg-red-500/10 border-2 border-red-500/20 rounded-3xl"><h2 class="text-xl font-black mb-2 uppercase">Ошибка</h2><p class="text-slate-400 mb-6">${msg}</p><button onclick="window.location.reload()" class="px-6 py-2 bg-red-600 rounded-lg font-black uppercase text-xs">Обновить</button></div>`;
            lucide.createIcons();
        };

        const init = () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    localUser.uid = user.uid;
                    localUser.name = user.displayName || "Gamer";
                    localUser.photo = user.photoURL || "";
                    render();
                } else {
                    renderEntry(document.getElementById('main-content'));
                }
            });
        };

        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error(e);
                alert("Ошибка входа Google. Убедитесь, что вы включили Google Auth в консоли Firebase.");
            }
        };

        window.logoutAction = async () => {
            await signOut(auth);
            window.location.reload();
        };

        const joinRoom = async (code) => {
            if (!code) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            try {
                const snap = await getDoc(roomRef);
                const playerData = { uid: localUser.uid, name: localUser.name, photo: localUser.photo, team: 'unassigned' };
                
                if (!snap.exists()) {
                    await setDoc(roomRef, {
                        id: code, stage: 'lobby', players: [playerData],
                        teamSizeRadiant: 5, teamSizeDire: 5, nValues: [5, 5, 5, 5, 5],
                        pool: [], bans: [], picksRadiant: [], picksDire: [], draftSequence: []
                    });
                } else {
                    let players = snap.data().players || [];
                    if (!players.find(p => p.uid === localUser.uid)) {
                        players.push(playerData);
                        await updateDoc(roomRef, { players });
                    }
                }

                onSnapshot(roomRef, (doc) => {
                    if (doc.exists()) {
                        roomData = doc.data();
                        render();
                    }
                });
            } catch (e) {
                showError("Ошибка доступа. Проверьте Firestore Rules в консоли Firebase.");
            }
        };

        const updateRoom = async (updates) => {
            if (!roomData.id) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomData.id);
            await updateDoc(roomRef, updates);
        };

        // --- UI ACTIONS ---
        window.joinRoomAction = () => {
            const code = document.getElementById('room-code-input').value.toUpperCase();
            joinRoom(code);
        };
        window.shuffleAction = () => {
            let p = [...roomData.players];
            p.sort(() => Math.random() - 0.5);
            p.forEach((player, i) => player.team = i < p.length/2 ? 'Radiant' : 'Dire');
            updateRoom({ players: p });
        };
        window.confirmTeamsAction = () => {
            const r = roomData.players.filter(x => x.team === 'Radiant').length;
            const d = roomData.players.filter(x => x.team === 'Dire').length;
            updateRoom({ stage: 'init', teamSizeRadiant: r || 5, teamSizeDire: d || 5 });
        };
        window.startDraftSetup = () => {
            const seq = [];
            let ra=0, da=0, ct='Radiant', rc=roomData.teamSizeRadiant, dc=roomData.teamSizeDire;
            while(ra<rc || da<dc) {
                let count = Math.min(seq.length===0?1:2, (ct==='Radiant'?rc-ra : dc-da));
                if(count>0) { seq.push({team:ct, count}); if(ct==='Radiant') ra+=count; else da+=count; }
                ct = ct==='Radiant'?'Dire':'Radiant';
            }
            updateRoom({ draftSequence: seq, stage: 'setup' });
        };
        window.generatePoolAction = () => {
            let pool = []; let used = new Set();
            roomData.nValues.forEach((n, i) => {
                const pos = i+1;
                const eligible = HEROES.filter(h => h.positions.includes(pos) && !used.has(h.id))
                    .sort(() => 0.5 - Math.random()).slice(0, n);
                eligible.forEach(h => { used.add(h.id); pool.push(h); });
            });
            updateRoom({ pool, stage: 'banning' });
        };
        window.handleHeroClick = (id) => {
            const h = roomData.pool.find(x => x.id === id);
            if (!h) return;
            if (roomData.stage === 'banning' && roomData.bans.length < 4 && !roomData.bans.find(x => x.id === id)) {
                const b = [...roomData.bans, h];
                updateRoom({ bans: b, stage: b.length === 4 ? 'picking' : 'banning' });
            } else if (roomData.stage === 'picking') {
                const used = [...roomData.bans, ...roomData.picksRadiant, ...roomData.picksDire].find(x => x.id === id);
                if (!used) {
                    const stepIdx = (() => {
                        let acc=0, total = roomData.picksRadiant.length + roomData.picksDire.length;
                        for(let i=0; i<roomData.draftSequence.length; i++) {
                            acc += roomData.draftSequence[i].count;
                            if(total < acc) return i;
                        }
                        return -1;
                    })();
                    const step = roomData.draftSequence[stepIdx];
                    if (!step) return;
                    if (step.team === 'Radiant') {
                        const p = [...roomData.picksRadiant, h];
                        updateRoom({ picksRadiant: p, stage: (p.length === roomData.teamSizeRadiant && roomData.picksDire.length === roomData.teamSizeDire) ? 'result' : 'picking' });
                    } else {
                        const p = [...roomData.picksDire, h];
                        updateRoom({ picksDire: p, stage: (p.length === roomData.teamSizeDire && roomData.picksRadiant.length === roomData.teamSizeRadiant) ? 'result' : 'picking' });
                    }
                }
            }
        };

        const render = () => {
            const main = document.getElementById('main-content');
            const roomDisplay = document.getElementById('room-display');
            const headerControls = document.getElementById('header-controls');
            
            if (roomData.id) roomDisplay.innerHTML = `ROOM: <span class="text-amber-500 font-black">${roomData.id}</span>`;

                <div class="flex items-center gap-3 bg-white/5 p-1 rounded-xl border border-white/5">

                    <button onclick="logoutAction()" class="p-2 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            `;

            if (roomData.id === '') renderRoomJoin(main);
            else if (roomData.stage === 'lobby') renderLobby(main);
            else if (roomData.stage === 'init') renderInit(main);
            else if (roomData.stage === 'setup') renderSetup(main);
            else renderDraft(main);
            lucide.createIcons();
        };

        const getHeroImg = (h) => h ? `<img src="${CDN_BASE}${h.imgName}.png" class="hero-img" alt="${h.name}">` : '';

        const renderEntry = (c) => {
            c.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[50vh] animate-in fade-in zoom-in">
                    <div class="bg-[#15171e] p-10 rounded-[3rem] border border-white/10 shadow-2xl w-full max-w-md space-y-8 text-center">
                        <div class="space-y-2"><h2 class="text-3xl font-black text-white uppercase italic tracking-tighter">Вход</h2><p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Авторизуйтесь через Google</p></div>
                        <button onclick="loginWithGoogle()" class="google-btn w-full py-5 flex items-center justify-center gap-4 rounded-2xl font-black text-lg uppercase tracking-widest">
                            <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.92,19.27 6.23,16.59 6.23,13.32C6.23,10.05 8.92,7.36 12.19,7.36C14.45,7.36 15.74,8.56 15.74,8.56L17.67,6.63C17.67,6.63 15.53,4.64 12.19,4.64C7.34,4.64 3.5,8.53 3.5,13.32C3.5,18.11 7.34,22 12.19,22C17.43,22 21.38,18.33 21.38,13.09C21.38,12.4 21.35,11.1 21.35,11.1V11.1Z"/></svg>
                            ВИТЯЗЬ GOOGLE
                        </button>
                    </div>
                </div>`;
            lucide.createIcons();
        };

        const renderRoomJoin = (c) => {
            c.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[40vh] animate-in slide-in-from-top">
                    <div class="bg-[#15171e] p-10 rounded-[3rem] border border-white/10 shadow-2xl w-full max-w-md space-y-6">
                        <div class="text-center"><p class="text-slate-500 text-xs font-black uppercase tracking-widest mb-1">Привет, ${localUser.name}</p><h2 class="text-2xl font-black text-white uppercase tracking-tighter italic">Войти в комнату</h2></div>
                        <input id="room-code-input" placeholder="КОД КОМНАТЫ" class="w-full bg-black/40 border-2 border-white/5 rounded-2xl p-5 text-xl font-black text-center text-white outline-none focus:border-amber-500 transition-all uppercase tracking-widest">
                        <button onclick="joinRoomAction()" class="w-full py-5 bg-gradient-to-r from-red-600 to-amber-600 text-white rounded-2xl font-black text-xl active:scale-95 transition-all uppercase tracking-widest">ПОДКЛЮЧИТЬСЯ</button>
                    </div>
                </div>`;
        };

        const renderLobby = (c) => {
            const r = roomData.players.filter(p => p.team === 'Radiant');
            const d = roomData.players.filter(p => p.team === 'Dire');
            const u = roomData.players.filter(p => p.team === 'unassigned');
            c.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in">
                    <div class="team-card p-6 rounded-[2rem] border-t-4 border-t-green-500">
                        <h3 class="text-xl font-black text-green-500 mb-4 italic">RADIANT (${r.length})</h3>
                        <div class="space-y-2">${r.map(p => `<div class="p-3 bg-white/5 rounded-xl font-bold flex items-center gap-3">${p.photo ? `<img src="${p.photo}" class="w-5 h-5 rounded">`:''}${p.name}</div>`).join('')}</div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <div class="team-card p-6 rounded-3xl"><h3 class="text-xs font-black text-slate-500 mb-4 uppercase text-center italic">В лобби</h3><div class="flex flex-wrap gap-2 justify-center">${u.map(p => `<span class="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-black">${p.name}</span>`).join('')}</div></div>
                        <button onclick="shuffleAction()" class="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-lg active:scale-95 transition-all uppercase tracking-widest shadow-xl"><i data-lucide="shuffle" class="inline mr-2"></i> SHUFFLE</button>
                        <button onclick="confirmTeamsAction()" class="w-full py-4 bg-white text-black rounded-[2rem] font-black text-sm active:scale-95 transition-all uppercase tracking-widest">CONFIRM</button>
                    </div>
                    <div class="team-card p-6 rounded-[2rem] border-t-4 border-t-red-600">
                        <h3 class="text-xl font-black text-red-600 mb-4 italic text-right">DIRE (${d.length})</h3>
                        <div class="space-y-2">${d.map(p => `<div class="p-3 bg-white/5 rounded-xl font-bold flex items-center flex-row-reverse gap-3 text-right">${p.photo ? `<img src="${p.photo}" class="w-5 h-5 rounded">`:''}${p.name}</div>`).join('')}</div>
                    </div>
                </div>`;
        };

        const renderInit = (c) => {
            c.innerHTML = `
                <div class="flex items-center justify-center min-h-[40vh]">
                    <div class="bg-[#15171e] p-10 rounded-[3rem] border border-white/10 text-center w-full max-w-md">
                        <h2 class="text-xl font-black text-white mb-8 uppercase tracking-widest">ИГРОКИ: ${roomData.teamSizeRadiant} VS ${roomData.teamSizeDire}</h2>
                        <button onclick="startDraftSetup()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl active:scale-95 transition-all uppercase tracking-widest">ПЕРЕЙТИ К ПУЛУ</button>
                    </div>
                </div>`;
        };

        const renderSetup = (c) => {
            c.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="bg-[#15171e] p-7 rounded-3xl border border-white/5 h-fit shadow-2xl">
                        <h2 class="text-xs font-black mb-8 text-blue-400 uppercase tracking-widest italic">Настройка Пула</h2>
                        <div class="space-y-4">${[1,2,3,4,5].map((p,i) => `<div class="flex items-center justify-between"><span class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Позиция ${p}</span><input type="number" value="${roomData.nValues[i]}" onchange="let v=[...roomData.nValues];v[${i}]=parseInt(this.value);updateRoom({nValues:v})" class="w-16 bg-black/40 rounded-lg p-2 text-center text-white outline-none border border-white/10 font-mono text-xl"></div>`).join('')}</div>
                        <button onclick="generatePoolAction()" class="w-full mt-10 py-5 bg-blue-600 text-white rounded-2xl font-black text-lg active:scale-95 transition-all uppercase tracking-widest shadow-xl">СГЕНЕРИРОВАТЬ</button>
                    </div>
                    <div class="lg:col-span-3 bg-[#15171e] p-8 rounded-3xl border border-white/5 shadow-2xl">
                        <div class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-4 opacity-30 grayscale">
                            ${HEROES.slice(0, 24).map(h => `<div class="hero-img-container rounded-xl border border-white/5">${getHeroImg(h)}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
        };

        const renderDraft = (c) => {
            const total = roomData.picksRadiant.length + roomData.picksDire.length;
            const stepIdx = (() => {
                let acc=0; for(let i=0; i<roomData.draftSequence.length; i++) {
                    acc += roomData.draftSequence[i].count; if(total < acc) return i;
                } return -1;
            })();
            const step = roomData.draftSequence[stepIdx];
            const isBanning = roomData.stage === 'banning';
            const picker = isBanning ? (roomData.bans.length % 2 === 0 ? 'Radiant' : 'Dire') : (step ? step.team : null);
            
            c.innerHTML = `
                <div class="space-y-8 animate-in slide-in-from-bottom duration-700">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
                        <div class="team-card p-6 rounded-[2.5rem] border-4 transition-all duration-700 ${picker==='Radiant'?'border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.1)]':'border-transparent'}">
                            <h3 class="text-3xl font-black text-green-500 mb-6 italic tracking-tighter uppercase">RADIANT</h3>
                            <div class="grid grid-cols-5 gap-2">${[...Array(roomData.teamSizeRadiant)].map((_,i) => `<div class="hero-img-container rounded-xl bg-black/50 border-2 border-white/5">${getHeroImg(roomData.picksRadiant[i])}</div>`).join('')}</div>
                        </div>
                        <div class="bg-[#1a1d26] p-8 rounded-[2.5rem] border-2 border-white/10 text-center shadow-2xl">
                            ${roomData.stage==='result' ? `<div class="text-amber-500 font-black text-7xl italic animate-pulse">БИТВА!</div>` : `<div class="text-7xl font-black italic tracking-tighter ${isBanning?'text-shimmer-red':'text-white'}">${isBanning?'БАН':'ПИК'}</div><div class="text-2xl font-black mt-2 tracking-widest ${picker==='Radiant'?'text-green-500':'text-red-600'}">${picker?picker.toUpperCase():''}</div>`}
                            <div class="flex justify-center gap-2 mt-8">${[0,1,2,3].map(i => `<div class="w-12 h-16 bg-black rounded-xl overflow-hidden grayscale opacity-50 border-2 border-red-900/20">${getHeroImg(roomData.bans[i])}</div>`).join('')}</div>
                        </div>
                        <div class="team-card p-6 rounded-[2.5rem] border-4 transition-all duration-700 ${picker==='Dire'?'border-red-600 shadow-[0_0_30px_rgba(220,38,38,0.1)]':'border-transparent'}">
                            <h3 class="text-3xl font-black text-red-600 mb-6 italic tracking-tighter uppercase text-right">DIRE</h3>
                            <div class="grid grid-cols-5 gap-2">${[...Array(roomData.teamSizeDire)].map((_,i) => `<div class="hero-img-container rounded-xl bg-black/50 border-2 border-white/5 flex-row-reverse">${getHeroImg(roomData.picksDire[i])}</div>`).join('')}</div>
                        </div>
                    </div>
                    <div class="bg-[#15171e] p-10 rounded-[3rem] border border-white/5 shadow-2xl">
                        <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-10 gap-4">
                            ${roomData.pool.map(h => {
                                const isB = roomData.bans.find(x=>x.id===h.id);
                                const isP = [...roomData.picksRadiant, ...roomData.picksDire].find(x=>x.id===h.id);
                                return `<div onclick="handleHeroClick(${h.id})" class="hero-img-container rounded-xl border-2 cursor-pointer transition-all duration-300 ${isB?'opacity-10 grayscale':isP?'opacity-5':'border-slate-800 hover:border-amber-500 hover:scale-105 shadow-xl'}">${getHeroImg(h)}</div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
        };

        init();
    </script>
</body>
</html>
