    <style>

        .group:hover .hero-img { transform: scale(1.05); }
        
        @keyframes text-shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .hero-banned-fx { filter: grayscale(100%) brightness(0.4); opacity: 0.5; }

        .ban-quota-slot { width: 44px; height: 56px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); overflow: hidden; position: relative; }
        
        @keyframes hero-appear { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-hero { opacity: 0; animation: hero-appear 0.4s forwards; }

        .timer-circle { transition: stroke-dashoffset 0.1s linear; }
        
        .scrollbar-custom::-webkit-scrollbar { width: 10px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-red { 0%, 100% { border-color: rgba(220, 38, 38, 0.5); } 50% { border-color: rgba(220, 38, 38, 1); } }
        .pending-ban-glow { animation: pulse-red 1.5s infinite; border-width: 2px !important; }

        .active-picker-slot { z-index: 50; transform: scale(1.15); border: 2px solid #f59e0b !important; background: rgba(245, 158, 11, 0.1) !important; animation: pulse-active-slot 2s infinite; }

        .role-tag { font-size: 8px; padding: 1px 3px; border-radius: 3px; font-weight: 900; cursor: pointer; transition: all 0.2s; }
        .role-tag.active { background: #4ade80; color: #000; }

        const appId = "dota-drafter-pro-v9"; // v9: slim data format, local-first setup

        const app = initializeApp(firebaseConfig);

        const ANIM_DELAY = 5500;

        let localUser = { name: '', uid: '', photo: '', team: 'unassigned' };
        // v9 slim data: pool/picksRadiant/picksDire = [heroId,...], bans = [{i:heroId, t:team},...]
        // timerStart replaces timerEnd; excludedHeroIds/customHeroPositions removed from DB
        let roomData = { 
            id: '', stage: 'entry', players: [], hostUid: '', 
            nValues: [5,5,5,5,5], pool: [], bans: [], picksRadiant: [], picksDire: [], draftSequence: [], 
            bansRadiant: 2, bansDire: 2, strategyIdx: 0, timerStart: 0, isExtraTime: false, votes: {},

        let isLocalMode = false;
        let poolAnimationPlayed = true;

        let tagManagerScrollTop = 0;

        // Step 1: Local-First Setup — never synced to Firestore

        let localExcludedIds = new Set(); // excluded hero IDs

        // Step 2: Debounce state

        let _pendingUpdate = {};

        // Step 3: Guard against duplicate finalizeTurn
        let _finalizingTurn = false;

        const HEROES = [

s: [2, 3] }, { id: 29, name: "Drow Ranger", imgName: "drow_ranger", positions: [1] }, { id: 30, name: "Earth Spirit", imgName: "earth_spirit", positions: [4] }, { id: 31, name: "Earthshaker", imgName: "earthshaker", positions: [4, 3] }, { id: 32, name: "Elder Titan", imgName: "elder_titan", positions: [4, 5] }, { id: 33, name: "Ember Spirit", imgName: "ember_spirit", positions: [2] }, { id: 34, name: "Enchantress", imgName: "enchantress", positions: [5, 4] }, { id: 35, name: "Enigma", imgName: "enigma", positions: [3, 4] }, { id: 36, name: "Faceless Void", imgName: "faceless_void", positions: [1] }, { id: 37, name: "Grimstroke", imgName: "grimstroke", positions: [4, 5] }, { id: 38, name: "Gyrocopter", imgName: "gyrocopter", positions: [1, 4] }, { id: 39, name: "Hoodwink", imgName: "hoodwink", positions: [4] }, { id: 40, name: "Huskar", imgName: "huskar", positions: [2] }, { id: 41, name: "Invoker", imgName: "invoker", positions: [2] }, { id: 42, name: "Io", imgName: "wisp", positions: [5, 4] }, { id: 43, name: "Jakiro", imgName: "jakiro", positions: [5, 4] }, { id: 44, name: "Juggernaut", imgName: "juggernaut", positions: [1] }, { id: 45, name: "KOTL", imgName: "keeper_of_the_light", positions: [4, 5] }, { id: 46, name: "Kunkka", imgName: "kunkka", positions: [2, 3] }, { id: 47, name: "Legion", imgName: "legion_commander", positions: [3] }, { id: 48, name: "Leshrac", imgName: "leshrac", positions: [2, 4] }, { id: 49, name: "Lich", imgName: "lich", positions: [5] }, { id: 50, name: "Lifestealer", imgName: "life_stealer", positions: [1] }, { id: 51, name: "Lina", imgName: "lina", positions: [2, 4] }, { id: 52, name: "Lion", imgName: "lion", positions: [5, 4] }, { id: 53, name: "Lone Druid", imgName: "lone_druid", positions: [1, 2, 3] }, { id: 54, name: "Luna", imgName: "luna", positions: [1] }, { id: 55, name: "Lycan", imgName: "lycan", positions: [3] }, { id: 56, name: "Magnus", imgName: "magnataur", positions: [3, 2] }, { id: 57, name: "Marci", imgName: "marci", positions: [4, 3] }, { id: 58, name: "Mars", imgName: "mars", positions: [3] }, { id: 59, name: "Medusa", imgName: "medusa", positions: [1] }, { id: 60, name: "Meepo", imgName: "meepo", positions: [1, 2] }, { id: 61, name: "Mirana", imgName: "mirana", positions: [4] }, { id: 62, name: "Monkey King", imgName: "monkey_king", positions: [1, 2] }, { id: 63, name: "Morphling", imgName: "morphling", positions: [1] }, { id: 64, name: "Muerta", imgName: "muerta", positions: [1, 2] }, { id: 65, name: "Naga Siren", imgName: "naga_siren", positions: [1, 4] }, { id: 66, name: "Nature", imgName: "furion", positions: [3, 2, 4, 5] }, { id: 67, name: "Necrophos", imgName: "necrolyte", positions: [2, 3] }, { id: 68, name: "Night Stalker", imgName: "night_stalker", positions: [3] }, { id: 69, name: "Nyx", imgName: "nyx_assassin", positions: [4] }, { id: 70, name: "Ogre Magi", imgName: "ogre_magi", positions: [5] }, { id: 71, name: "Omniknight", imgName: "omniknight", positions: [5, 3] }, { id: 72, name: "Oracle", imgName: "oracle", positions: [5] }, { id: 73, name: "OD", imgName: "obsidian_destroyer", positions: [2] }, { id: 74, name: "Pangolier", imgName: "pangolier", positions: [2, 3] }, { id: 75, name: "PA", imgName: "phantom_assassin", positions: [1] }, { id: 76, name: "PL", imgName: "phantom_lancer", positions: [1] }, { id: 77, name: "Phoenix", imgName: "phoenix", positions: [3, 4] }, { id: 78, name: "Primal Beast", imgName: "primal_beast", positions: [2, 3] }, { id: 79, name: "Puck", imgName: "puck", positions: [2] }, { id: 80, name: "Pudge", imgName: "pudge", positions: [1, 4, 5] }, { id: 81, name: "Pugna", imgName: "pugna", positions: [2, 4, 5] }, { id: 82, name: "QOP", imgName: "queenofpain", positions: [2] }, { id: 83, name: "Razor", imgName: "razor", positions: [1, 3] }, { id: 84, name: "Riki", imgName: "riki", positions: [1, 4] }, { id: 85, name: "Rubick", imgName: "rubick", positions: [4] }, { id: 86, name: "Sand King", imgName: "sand_king", positions: [3, 4] }, { id: 87, name: "Shadow Demon", imgName: "shadow_demon", positions: [5] }, { id: 88, name: "SF", imgName: "nevermore", positions: [2] }, { id: 89, name: "Shadow Shaman", imgName: "shadow_shaman", positions: [5] }, { id: 90, name: "Silencer", imgName: "silencer", positions: [5, 4] }, { id: 91, name: "Skywrath", imgName: "skywrath_mage", positions: [4, 5] }, { id: 92, name: "Slardar", imgName: "slardar", positions: [3] }, { id: 93, name: "Slark", imgName: "slark", positions: [1] }, { id: 94, name: "Snapfire", imgName: "snapfire", positions: [2, 4] }, { id: 95, name: "Sniper", imgName: "sniper", positions: [1, 2] }, { id: 96, name: "Spectre", imgName: "spectre", positions: [1] }, { id: 97, name: "Spirit Breaker", imgName: "spirit_breaker", positions: [3, 4] }, { id: 98, name: "Storm Spirit", imgName: "storm_spirit", positions: [2] }, { id: 99, name: "Sven", imgName: "sven", positions: [1, 3] }, { id: 100, name: "Techies", imgName: "techies", positions: [4] }
        ];

        // Step 4: Hydrate a hero ID to full object
        function getHeroById(id) { return id ? HEROES.find(h => h.id === id) || null : null; }
        // Step 1: During setup reads local state; outside setup reads HEROES defaults
        function getHeroPositions(heroId) { return localSetupPositions[heroId] || HEROES.find(h => h.id === heroId)?.positions || []; }
        function getStrategies(r, d) {
            const gen = (p) => { 
                let s = [], ra = 0, da = 0, ct = 'Radiant'; 
                while(ra < r || da < d) { 
                    let t = p[s.length % p.length]; 
                    let c = Math.min(t, (ct==='Radiant'? r-ra : d-da)); 
                    if(c > 0) { s.push({team:ct, count:c}); if(ct==='Radiant') ra+=c; else da+=c; } 
                    ct = ct==='Radiant'?'Dire':'Radiant'; 
                } return s; 
            };
            return [{ name: "Professional", seq: gen([1, 2, 2, 2, 1]) }, { name: "Tournament (1-by-1)", seq: gen([1, 1]) }];
        }
        function getTurnDuration(type) { 
            if (type === 'picking') return roomData.infinitePickTime ? 999999999 : (roomData.pickDuration * 1000);
            if (type === 'banning') return roomData.infiniteBanTime ? 999999999 : (roomData.banDuration * 1000);
            return 15000; 
        }
        function getHeroImg(h) { return h ? `<img src="${CDN_BASE}${h.imgName}.png" class="hero-img" alt="${h.name}" draggable="false">` : ''; }
        function isAdmin() { return roomData.hostUid && roomData.hostUid === localUser.uid; }
        
        function getCurrentPickPlayer() {
            const totalPicks = (roomData.picksRadiant?.length || 0) + (roomData.picksDire?.length || 0);
            const totalExpected = (roomData.teamSizeRadiant || 0) + (roomData.teamSizeDire || 0);
            if (totalPicks >= totalExpected) return null;
            
            let acc = 0;
            for(let step of roomData.draftSequence) { 
                acc += step.count; 
                if(totalPicks < acc) {
                    const teamPlayers = roomData.players.filter(p => p.team === step.team).sort((a,b) => a.slot - b.slot);
                    const playerIndex = (step.team === 'Radiant' ? (roomData.picksRadiant?.length || 0) : (roomData.picksDire?.length || 0));
                    return teamPlayers[playerIndex] || null;
                }
            } return null;
        }

        // Step 2: Debounced updateRoom
        // immediate=true  → cancel debounce, write now (stage transitions, confirms)
        // immediate=false → apply locally for instant UI, batch writes with 500ms debounce (votes, picks)
        const updateRoom = async (u, immediate = false) => { 
            const manager = document.getElementById('hero-tag-manager');
            if (manager) tagManagerScrollTop = manager.scrollTop;
            if (isLocalMode) { roomData = { ...roomData, ...u }; render(); return; }
            // Accumulate partial updates and apply optimistically
            _pendingUpdate = { ..._pendingUpdate, ...u };
            roomData = { ...roomData, ...u };
            if (immediate) {
                if (_debounceTimer) { clearTimeout(_debounceTimer); _debounceTimer = null; }
                const toSend = { ..._pendingUpdate };
                _pendingUpdate = {};
                render();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomData.id), toSend);
            } else {
                render(); // instant local feedback
                if (_debounceTimer) clearTimeout(_debounceTimer);
                _debounceTimer = setTimeout(async () => {
                    _debounceTimer = null;
                    const toSend = { ..._pendingUpdate };
                    _pendingUpdate = {};
                    if (Object.keys(toSend).length > 0)
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomData.id), toSend);
                }, 500);
            }
        };

        // Step 3+4: finalizeTurn uses slim bans {i,t} and timerStart
        const finalizeTurn = async () => {
            if (!isAdmin() || _finalizingTurn) return;
            _finalizingTurn = true;
            if (botActionTimeout) { clearTimeout(botActionTimeout); botActionTimeout = null; }
            try {
                if (roomData.stage === 'banning') {
                    const teamVotes = Object.entries(roomData.votes || {}).filter(([uid]) => {
                        const p = roomData.players.find(x => x.uid === uid);
                        return p && p.team === roomData.currentTurnTeam;
                    }).map(([, hid]) => hid);
                    let winnerId = null;
                    if (teamVotes.length === 0) {
                        const avail = roomData.pool.filter(id => !roomData.bans.find(b => b.i === id));
                        winnerId = avail[Math.floor(Math.random() * avail.length)];
                    } else {
                        const counts = {}; teamVotes.forEach(id => counts[id] = (counts[id] || 0) + 1);
                        const winners = Object.keys(counts).filter(id => counts[id] === Math.max(...Object.values(counts)));
                        winnerId = parseInt(winners[Math.floor(Math.random() * winners.length)]);
                    }
                    // Slim ban format: {i: heroId, t: teamName}
                    const newBans = [...(roomData.bans || []), { i: winnerId, t: roomData.currentTurnTeam }];
                    const rBMade = newBans.filter(b => b.t === 'Radiant').length;
                    const dBMade = newBans.filter(b => b.t === 'Dire').length;
                    if (rBMade >= roomData.bansRadiant && dBMade >= roomData.bansDire) {
                        await updateRoom({ bans: newBans, stage: 'picking', timerStart: Date.now(), isExtraTime: false, votes: {}, currentTurnTeam: 'Radiant', pendingHeroId: null }, true);
                    } else {
                        let nextT = (rBMade < roomData.bansRadiant && dBMade < roomData.bansDire) ? (newBans.length % 2 === 0 ? 'Radiant' : 'Dire') : (rBMade < roomData.bansRadiant ? 'Radiant' : 'Dire');
                        await updateRoom({ bans: newBans, currentTurnTeam: nextT, timerStart: Date.now(), isExtraTime: false, votes: {} }, true);
                    }
                } else if (roomData.stage === 'picking') {
                    const total = (roomData.picksRadiant?.length || 0) + (roomData.picksDire?.length || 0);
                    const totalExpected = (roomData.teamSizeRadiant || 0) + (roomData.teamSizeDire || 0);
                    if (total >= totalExpected) {
                        await updateRoom({ stage: 'result' }, true);
                    } else {
                        let acc = 0, nextTeam = 'Radiant';
                        for(let step of roomData.draftSequence) { acc += step.count; if(total < acc) { nextTeam = step.team; break; } }
                        await updateRoom({ currentTurnTeam: nextTeam, timerStart: Date.now(), isExtraTime: false, pendingHeroId: null }, true);
                    }
                }
            } finally { _finalizingTurn = false; }
        };

        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); isLocalMode = false; } catch (e) { console.error(e); } };
        window.loginOfflineAction = () => { isLocalMode = true; localUser = { uid: "local_" + Math.random().toString(36).substr(2, 4), name: "Player", photo: `https://api.dicebear.com/7.x/avataaars/svg?seed=offline` }; joinRoom("OFFLINE_1"); };
        window.logoutAction = async () => { if (!isLocalMode) await signOut(auth); window.location.reload(); };
        window.joinRoomAction = () => joinRoom(document.getElementById('room-code-input')?.value.trim().toUpperCase() || "BATTLE");
        window.addBotAction = async () => { if (!isAdmin()) return; const botId = 'bot_' + Math.random().toString(36).substr(2, 9); updateRoom({ players: [...roomData.players, { uid: botId, name: "Bot " + Math.floor(Math.random()*99), photo: `https://api.dicebear.com/7.x/bottts/svg?seed=${botId}`, team: 'unassigned', slot: -1 }] }, true); };
        window.joinTeamAction = async (team, slot) => { const players = [...roomData.players]; const idx = players.findIndex(p => p.uid === localUser.uid); if (idx === -1 || (team !== 'unassigned' && players.find(p => p.team === team && p.slot === slot))) return; players[idx].team = team; players[idx].slot = slot; updateRoom({ players }, true); };
        window.shuffleAction = async () => { if (!isAdmin()) return; let p = [...roomData.players].sort(() => Math.random() - 0.5); const tR = Math.ceil(p.length / 2); let cR = 0, cD = 0; p.forEach(pl => { if (cR < tR && cR < 5) { pl.team = 'Radiant'; pl.slot = cR++; } else if (cD < 5) { pl.team = 'Dire'; pl.slot = cD++; } else { pl.team = 'unassigned'; pl.slot = -1; } }); updateRoom({ players: p }, true); };

                c.innerHTML = `<div class="space-y-12 animate-in slide-in-from-bottom duration-1000"><div class="text-center space-y-2"><div class="text-amber-500 font-black text-8xl italic animate-pulse uppercase tracking-tighter">BATTLE START</div></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12"><div><h3 class="text-3xl font-black text-green-500 uppercase mb-8">Radiant</h3><div class="space-y-4">${renderHeroResultEntry('Radiant', roomData.teamSizeRadiant)}</div></div><div><h3 class="text-3xl font-black text-red-600 uppercase mb-8 text-right">Dire</h3><div class="space-y-4">${renderHeroResultEntry('Dire', roomData.teamSizeDire)}</div></div></div>
                    <div class="pt-12 border-t border-white/5"><h3 class="text-[10px] font-black text-slate-600 uppercase mb-6 tracking-widest text-center">Remaining Hero Pool</h3><div class="flex gap-3 overflow-x-auto pb-6 scrollbar-hide px-8">${sortedPool.filter(h => !roomData.bans.find(b => b.i === h.id) && !roomData.picksRadiant?.includes(h.id) && !roomData.picksDire?.includes(h.id)).map(h => `<div class="w-24 h-32 shrink-0 rounded-[1.5rem] border-2 border-white/10 overflow-hidden grayscale opacity-20">${getHeroImg(h)}</div>`).join('')}</div></div>
                    <div class="flex justify-center pb-12">${isAdmin() ? `<button onclick="startOverAction()" class="px-16 py-5 bg-red-600 text-white rounded-[2rem] font-black uppercase shadow-2xl hover:bg-red-500 transition-all active:scale-95">Reset Draft</button>` : ''}</div></div>`;
            } else {
                c.innerHTML = `<div class="space-y-6">
                    <div class="flex items-center justify-center gap-2 mb-8 bg-black/40 p-4 rounded-[2rem] border border-white/5 overflow-x-auto scrollbar-hide shadow-xl">${roomData.draftSequence.map((s, i) => { const totalP = (roomData.picksRadiant?.length || 0) + (roomData.picksDire?.length || 0); let curI = -1, acc = 0; for(let j=0; j<roomData.draftSequence.length; j++) { acc += roomData.draftSequence[j].count; if(totalP < acc) { curI = j; break; } } return `<div class="flex items-center gap-2 px-5 py-2 border-2 rounded-2xl font-black transition-all ${i===curI?'border-white scale-110 bg-white/10' : (i<curI?'opacity-10':'opacity-40 border-white/10')} ${s.team==='Radiant'?'text-green-500':'text-red-600'}"><span class="text-[10px] uppercase">${s.team[0]}</span><span class="text-xl">+${s.count}</span></div>`; }).join('<div class="w-3 h-px bg-white/5 shrink-0"></div>')}</div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start"><div class="team-card p-8 rounded-[3rem] border-4 transition-all duration-700 ${roomData.currentTurnTeam==='Radiant'?'border-green-500':'border-transparent'}"><h3 class="text-2xl font-black text-green-500 mb-6 italic uppercase text-center">RADIANT</h3><div class="grid grid-cols-5 gap-3">${renderSlots('Radiant', roomData.picksRadiant, roomData.teamSizeRadiant)}</div></div>
                        <div class="bg-[#1a1d26] p-8 rounded-[3rem] border-2 border-white/10 text-center shadow-2xl flex flex-col justify-center min-h-[380px] relative overflow-hidden">
                            <div class="absolute top-8 left-1/2 -translate-x-1/2 w-20 h-20"><svg class="w-full h-full -rotate-90" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"></circle><circle id="timer-progress" cx="50" cy="50" r="45" fill="none" stroke="${roomData.currentTurnTeam==='Radiant'?'#22c55e':'#ef4444'}" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="0" class="timer-circle"></circle></svg><div id="turn-timer-text" class="absolute inset-0 flex items-center justify-center text-3xl font-black italic">--</div></div>
                            <div class="mt-28 flex flex-col items-center">
                                <div class="text-4xl font-black italic tracking-tight ${isB?'text-red-500':'text-white'} uppercase leading-none">${isB?'БАН':'ПИК'}</div>
                                <div class="text-xl font-black mt-1 tracking-widest ${roomData.currentTurnTeam==='Radiant'?'text-green-500':'text-red-600'} uppercase">${roomData.currentTurnTeam}</div>
                                <div class="h-10 mt-2 flex flex-col items-center justify-center">
                                    ${isMyAction ? '<p class="text-amber-500 font-black uppercase text-xl italic animate-bounce tracking-widest leading-none">ВАШ ХОД!</p>' : ''}
                                    ${roomData.isExtraTime ? '<p class="text-[10px] text-amber-500 font-black uppercase animate-pulse border-2 border-amber-500/30 px-2 py-0.5 rounded-lg bg-amber-500/10 leading-none">EXTRA TIME!</p>' : ''}
                                </div>
                            </div>
                            <div class="mt-4 flex justify-between items-center px-4 w-full">
                                ${!isB && turnP && (turnP.uid === localUser.uid || (isAdmin() && turnP.uid.startsWith('bot'))) ? `<button onclick="confirmPickAction()" class="px-8 py-4 bg-white text-black rounded-2xl font-black uppercase text-xs hover:bg-slate-200 transition-all ${!roomData.pendingHeroId ? 'opacity-20 pointer-events-none' : 'shadow-xl active:scale-95'}">CONFIRM</button><button onclick="randomPickAction()" class="p-4 bg-white/5 border border-white/10 rounded-2xl text-slate-500 hover:text-white transition-all"><i data-lucide="shuffle" class="w-5 h-5"></i></button>` : `
                                <div class="w-full"><p class="text-[9px] font-black uppercase text-slate-600 mb-2 tracking-widest uppercase text-center">Progress</p><div class="flex gap-2 justify-center items-center"><div class="flex gap-1">${[...Array(roomData.bansRadiant)].map((_, i) => `<div class="ban-quota-slot border-green-500/20">${getHeroImg(getHeroById(roomData.bans.filter(x => x.t === 'Radiant')[i]?.i))}</div>`).join('')}</div><div class="w-px h-8 bg-white/5"></div><div class="flex gap-1">${[...Array(roomData.bansDire)].map((_, i) => `<div class="ban-quota-slot border-red-600/20">${getHeroImg(getHeroById(roomData.bans.filter(x => x.t === 'Dire')[i]?.i))}</div>`).join('')}</div></div></div>`}
                            </div>
                        </div><div class="team-card p-8 rounded-[3rem] border-4 transition-all duration-700 ${roomData.currentTurnTeam==='Dire'?'border-red-600':'border-transparent'}"><h3 class="text-2xl font-black text-red-600 mb-6 italic text-right uppercase text-center">DIRE</h3><div class="grid grid-cols-5 gap-3">${renderSlots('Dire', roomData.picksDire, roomData.teamSizeDire)}</div></div></div>
                    <div class="bg-[#15171e] p-8 rounded-[4rem] border border-white/5 shadow-2xl relative"><div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-10 gap-x-6 gap-y-10">${sortedPool.map((h, idx) => {
                        const isBan = roomData.bans.find(x => x.i === h.id);
                        const isPick = roomData.picksRadiant?.includes(h.id) || roomData.picksDire?.includes(h.id);
                        const activeTeamMembers = roomData.players.filter(p => p.team === roomData.currentTurnTeam);
                        const vCount = activeTeamMembers.filter(p => roomData.votes[p.uid] === h.id).length;
                        const bSize = 8 + (vCount * 4); 
                        const myV = roomData.votes[localUser.uid] === h.id, teamV = roomData.players.filter(p => p.team === myT && roomData.votes[p.uid] === h.id);
                        const oppV = Object.entries(roomData.votes || {}).some(([uid, hid]) => { const vP = roomData.players.find(p => p.uid === uid); return vP && vP.team !== myT && hid === h.id; });
                        const pend = roomData.pendingHeroId === h.id;
                        const anim = !poolAnimationPlayed, del = sortedPool.length > 0 ? (5 / sortedPool.length) : 0;
                        return `<div onclick="handleHeroClick(${h.id})" class="${(anim && !isR) ? 'animate-hero' : 'opacity-100'} group flex flex-col items-center gap-2 cursor-pointer" style="${(anim && !isR) ? `animation-delay: ${idx * del}s` : ''}"><div class="hero-img-container rounded-2xl border-2 ${pend ? 'pending-pick-glow scale-105' : (myV ? 'border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.2)]' : (isB && (vCount > 0 || oppV) ? 'pending-ban-glow' : (!isBan && !isPick ? 'border-slate-800' : 'border-transparent')))} ${isBan?'hero-banned-fx':isPick?'hero-picked-fx':''}">
                            ${getHeroImg(h)}${isB && (vCount > 0 || oppV) ? `<div class="absolute inset-0 bg-red-600/10 flex items-center justify-center pointer-events-none"><span class="text-white font-black uppercase bg-red-600 px-1.5 rounded -rotate-12 shadow-lg" style="font-size: ${bSize}px">BAN</span></div>` : ''}${pend ? `<div class="absolute inset-0 bg-amber-500/20 flex items-center justify-center animate-pulse pointer-events-none"><span class="text-black font-black text-[9px] uppercase bg-amber-500 px-1.5 rounded">PICK</span></div>` : ''}
                            <div class="absolute top-1 right-1 flex flex-wrap-reverse gap-0.5 justify-end">${teamV.map(v => `<img src="${v.photo}" class="w-4 h-4 rounded-sm border border-white/50 bg-black shadow-md">`).join('')}</div></div><span class="text-[8px] font-black uppercase text-slate-600 group-hover:text-white truncate w-full text-center">${h.name}</span></div>`;
                    }).join('')}</div></div></div>`;
                if (!poolAnimationPlayed && sortedPool.length > 0) setTimeout(() => { poolAnimationPlayed = true; }, ANIM_DELAY);
                lucide.createIcons();
            }
        };

        const render = () => {
            const container = document.getElementById('main-content'), roomDisp = document.getElementById('room-display'), ctrls = document.getElementById('header-controls');
            roomDisp.textContent = roomData.id ? `ROOM: ${roomData.id} • ${roomData.stage.toUpperCase()}` : 'DOTA DRAFTER';
            ctrls.innerHTML = localUser.uid ? `<div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-2xl border border-white/5"><img src="${localUser.photo}" class="w-6 h-6 rounded border border-white/10"><span class="text-[10px] font-black uppercase hidden sm:block">${localUser.name}</span><button onclick="logoutAction()" class="text-slate-500 hover:text-white"><i data-lucide="log-out" class="w-4 h-4"></i></button></div>` : '';
            lucide.createIcons();
            if (!roomData.id || roomData.stage === 'entry') { renderEntry(container); return; }
            switch(roomData.stage) {
                case 'lobby': renderLobby(container); break;
                case 'setup': renderSetup(container); break;
                case 'init': container.innerHTML = '<div class="flex flex-col items-center justify-center min-h-[40vh] gap-4"><div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div><p class="text-[10px] font-black uppercase text-amber-500 tracking-widest">Generating battlefield...</p></div>'; if(isAdmin()) generatePoolAction(); break;
                default: renderDraft(container); break;
            }
        };

        // Step 3: Timestamp-based timer — ZERO writes for time management
        // timerStart is the epoch ms when the turn started.
        // rawLeft = duration - elapsed. Visual acceleration when allVotedSame (no writes).
        const timerLogic = () => {
            if (!roomData.timerStart || roomData.stage === 'result' || roomData.stage === 'entry' || roomData.stage === 'lobby' || roomData.stage === 'setup' || !poolAnimationPlayed) return;
            
            const now = Date.now();
            const baseDur = getTurnDuration(roomData.stage);
            const extraDur = 10000;
            const currentTurnMax = roomData.isExtraTime ? extraDur : baseDur;
            const elapsed = now - roomData.timerStart;

            const teamMembers = roomData.players.filter(p => p.team === roomData.currentTurnTeam);
            const allInTeamVoted = roomData.stage === 'banning' && teamMembers.length > 0 && teamMembers.every(p => roomData.votes[p.uid]);

            // Bot actions (admin-only)
            if (isAdmin() && !botActionTimeout) {
                if (roomData.stage === 'banning') {
                    const bots = teamMembers.filter(p => p.uid.startsWith('bot') && !roomData.votes[p.uid]);
                    if (bots.length > 0) botActionTimeout = setTimeout(async () => {
                        const botUid = bots[0].uid;
                        const teamVotes = Object.entries(roomData.votes).filter(([uid]) => roomData.players.find(p => p.uid === uid)?.team === roomData.currentTurnTeam).map(([, hid]) => hid);
                        let chosenId;
                        if (teamVotes.length > 0 && Math.random() < 0.4) {
                            chosenId = teamVotes[Math.floor(Math.random() * teamVotes.length)];
                        } else {
                            // Step 4: pool is ID array, bans use .i
                            const avail = roomData.pool.filter(id => !roomData.bans.find(b => b.i === id) && !teamVotes.includes(id));
                            chosenId = (avail.length > 0 ? avail : roomData.pool)[Math.floor(Math.random() * Math.min(avail.length || 1, 5))];
                        }
                        await updateRoom({ votes: { ...roomData.votes, [botUid]: chosenId } });
                        botActionTimeout = null;
                    }, 2000 + Math.random() * 2000);
                } else if (roomData.stage === 'picking') {
                    const turnP = getCurrentPickPlayer();
                    if (turnP?.uid.startsWith('bot')) {
                        botActionTimeout = setTimeout(() => { randomPickAction(); botActionTimeout = null; }, 2500);
                    }
                }
            }

            // Step 3: Admin immediately finalizes when all team members have voted — zero writes
            if (isAdmin() && allInTeamVoted && !_finalizingTurn) { finalizeTurn(); return; }

            // Bug fix: Admin detects when all picks are done (e.g. a non-host made the last pick).
            // confirmPickAction only calls finalizeTurn() if isAdmin(), so the host must watch for completion.
            if (isAdmin() && roomData.stage === 'picking' && !_finalizingTurn) {
                const totalPicks = (roomData.picksRadiant?.length || 0) + (roomData.picksDire?.length || 0);
                const totalExpected = (roomData.teamSizeRadiant || 0) + (roomData.teamSizeDire || 0);
                if (totalExpected > 0 && totalPicks >= totalExpected) { finalizeTurn(); return; }
            }

            if (roomData.infinitePickTime && roomData.stage === 'picking') {
                if (document.getElementById('turn-timer-text')) document.getElementById('turn-timer-text').innerText = "--";
                const progress = document.getElementById('timer-progress');
                if (progress) progress.style.strokeDashoffset = 0;
                return;
            }

            // Step 3: Local visual acceleration when unanimous vote — NO writes
            const votes = teamMembers.map(p => roomData.votes[p.uid]).filter(Boolean);
            const allVotedSame = votes.length === teamMembers.length && votes.every(v => v === votes[0]) && votes.length > 0;
            const speedMul = (roomData.stage === 'banning' && allVotedSame) ? 4 : 1;
            const rawLeft = Math.max(0, currentTurnMax - elapsed * speedMul);

            const leftSec = Math.ceil(rawLeft / 1000);
            if (document.getElementById('turn-timer-text')) document.getElementById('turn-timer-text').innerText = leftSec;
            const progress = document.getElementById('timer-progress');
            if (progress) {
                const ratio = Math.min(1, rawLeft / currentTurnMax);
                progress.style.strokeDashoffset = 283 - (283 * ratio);
            }

            if (leftSec <= 0 && isAdmin() && !_finalizingTurn) {
                if (roomData.isExtraTime) {
                    if (roomData.stage === 'picking') {
                        if (roomData.pendingHeroId) confirmPickAction(); else randomPickAction();
                    } else finalizeTurn();
                } else {
                    if (roomData.stage === 'banning' && allInTeamVoted) finalizeTurn();
                    // Step 3: grant extra time with a timerStart reset — ONE write, not repeated
                    else updateRoom({ timerStart: now, isExtraTime: true }, true);
                }
            }
        };

        const joinRoom = async (code) => {
            // Slim initD: no excludedHeroIds/customHeroPositions, timerStart instead of timerEnd
            const initD = { id: code, stage: 'lobby', players: [{...localUser, team: 'unassigned', slot: -1}], hostUid: localUser.uid,
                nValues: [5,5,5,5,5], pool: [], bans: [], picksRadiant: [], picksDire: [],
                teamSizeRadiant: 5, teamSizeDire: 5, draftSequence: [], bansRadiant: 2, bansDire: 2,
                strategyIdx: 0, timerStart: 0, isExtraTime: false, votes: {}, currentTurnTeam: 'Radiant',
                pendingHeroId: null, pickDuration: 20, infinitePickTime: false,
                banDuration: 20, infiniteBanTime: false, randomPickIds: [] };
            if (isLocalMode) { roomData = initD; render(); return; }
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            try {
                const snap = await getDoc(ref); if (!snap.exists()) await setDoc(ref, initD);
                else { 
                    let p = snap.data().players || []; 
                    if (!p.find(x => x.uid === localUser.uid)) { 
                        p.push({...localUser, team: 'unassigned', slot: -1}); 
                        await updateDoc(ref, { players: p }); 
                    } 
                }
                onSnapshot(ref, d => { 
                    if (!d.exists()) { roomData = { id: '', stage: 'entry' }; render(); } 
                    else { 
                        const newData = d.data();
                        const oldStage = roomData.stage;
                        roomData = newData;
                        // Step 1: pool animation triggers on setup→banning (no more 'init' stage)
                        if (oldStage === 'setup' && roomData.stage === 'banning') {
                            poolAnimationPlayed = false;
                        }
                        render(); 
                    } 
                });
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, u => {
            if (u && !isLocalMode && u.providerData.length > 0) { 
                localUser = { uid: u.uid, name: u.displayName || "Elite", photo: u.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.uid}` }; 
                render(); 
            } else if (!isLocalMode && !localUser.uid) renderEntry(document.getElementById('main-content'));
        });
        setInterval(timerLogic, 100);
        window.onload = render;
    </script>
</body>
</html>
